<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Phaser Multiplayer Shooter</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #111;
    color: white;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
canvas {
    border: 2px solid #333;
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
}
#loginBox {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #222;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 0 15px rgba(0,0,0,0.8);
    border: 1px solid #444;
}
#loginBox input {
    padding: 10px;
    font-size: 16px;
    width: 200px;
    margin-bottom: 15px;
    border: 1px solid #555;
    background: #333;
    color: white;
    border-radius: 4px;
}
#loginBox button {
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    background: #ffaa00;
    border: none;
    font-weight: bold;
    border-radius: 5px;
    transition: background 0.2s;
}
#loginBox button:hover {
    background: #ffcc00;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { 
    getDatabase, ref, set, push, remove, update as fbUpdate,
    onValue, onDisconnect, onChildAdded, onChildRemoved
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

/* ================= FIREBASE CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyC77CXjhgwuiNqS9QxOHd8Tf8SPwEzFoHM",
  authDomain: "phaser-multiplayer-game-52eaa.firebaseapp.com",
  databaseURL: "https://phaser-multiplayer-game-52eaa-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "phaser-multiplayer-game-52eaa"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const database = getDatabase(app);

/* ================= GLOBAL VARIABLES ================= */
let playerId, playerName;
let localPlayer, cursors, mousePointer;
let walls, bulletsGroup;
let otherPlayers = {};
let bullets = {};

let playerHP = 5;
let isDead = false;
let score = 0;
let playerColor;

let shootCooldown = false;
let hpText, scoreText, leaderboardText;

let networkTimer = 0;
const NETWORK_RATE = 100; // wysyłanie pozycji co ~100ms
let gameScene; 

// Zmienne do mechaniki regeneracji
let lastActionTime = Date.now();
let isRegenerating = false;
let nextRegenTime = 0;

/* ================= LOGIN & MENU ================= */
async function login() {
    try {
        const user = await signInAnonymously(auth);
        playerId = user.user.uid;
        createMenu();
    } catch (e) {
        console.error("Firebase Login Error:", e);
        alert("Błąd logowania do Firebase!");
    }
}

function createMenu() {
    const div = document.createElement("div");
    div.id = "loginBox";

    const title = document.createElement("h2");
    title.innerText = "Arena Shooter 2D";
    
    const input = document.createElement("input");
    input.placeholder = "Wpisz swój nick...";

    const btn = document.createElement("button");
    btn.innerText = "Dołącz do Gry";

    btn.onclick = () => {
        playerName = input.value.trim();
        if(!playerName) return alert("Musisz podać nick!");
        div.remove();
        startGame();
    };

    div.append(title, input, document.createElement("br"), btn);
    document.body.appendChild(div);
}

/* ================= PHASER CONFIG & START ================= */
function startGame() {
    new Phaser.Game({
        type: Phaser.AUTO,
        width: 1200,
        height: 800,
        physics: { default: "arcade", arcade: { debug: false } },
        scene: { preload, create, update: gameUpdate }
    });
}

function preload() {}

/* ================= CREATE (INICJALIZACJA ŚRODOWISKA) ================= */
function create() {
    gameScene = this;

    // Mapa 3000x3000
    this.physics.world.setBounds(0, 0, 3000, 3000);
    this.cameras.main.setBounds(0, 0, 3000, 3000);

    // Tło siatki dla lepszej orientacji
    this.add.grid(1500, 1500, 3000, 3000, 100, 100, 0x111111, 1, 0x222222, 1);

    // Generowanie tekstur
    const bg = this.add.graphics();
    bg.fillStyle(0xffff00, 1);
    bg.fillCircle(6, 6, 6);
    bg.generateTexture('bulletTex', 12, 12);
    bg.destroy();

    const wg = this.add.graphics();
    wg.fillStyle(0x555555, 1);
    wg.fillRect(0, 0, 32, 32);
    wg.generateTexture('wallTex', 32, 32);
    wg.destroy();

    // Gracz lokalny
    playerColor = Phaser.Display.Color.RandomRGB().color;
    localPlayer = this.add.rectangle(1500, 1500, 32, 32, playerColor);
    this.physics.add.existing(localPlayer);
    localPlayer.body.setCollideWorldBounds(true);
    this.cameras.main.startFollow(localPlayer);

    cursors = this.input.keyboard.addKeys("W,A,S,D");
    mousePointer = this.input.activePointer;
    this.input.on("pointerdown", () => shoot());

    // Ściany statyczne
    walls = this.physics.add.staticGroup();
    createWall(this, 1500, 1000, 800, 40);
    createWall(this, 1500, 2000, 800, 40);
    createWall(this, 1000, 1500, 40, 800);
    createWall(this, 2000, 1500, 40, 800);

    this.physics.add.collider(localPlayer, walls);

    // Pociski
    bulletsGroup = this.physics.add.group();

    this.physics.add.collider(bulletsGroup, walls, (bullet) => {
        remove(ref(database, "bullets/" + bullet.dbId)).catch(()=>{});
    });

    // Wykrywanie trafienia (Overlap)
    this.physics.add.overlap(localPlayer, bulletsGroup, (player, bullet) => {
        if(isDead || bullet.owner === playerId || bullet.hasHit) return; 
        
        bullet.hasHit = true; 
        remove(ref(database, "bullets/" + bullet.dbId)).catch(()=>{});
        
        takeDamage(bullet.owner, bullet.x, bullet.y);
    });

    // === INTERFEJS UŻYTKOWNIKA (UI) ===
    hpText = this.add.text(20, 20, "HP: 5", { 
        fontSize: "32px", fill: "#ff4444", fontStyle: "bold", stroke: "#000", strokeThickness: 4 
    }).setScrollFactor(0).setDepth(100);
    
    scoreText = this.add.text(20, 65, "Score: 0", { 
        fontSize: "26px", fill: "#ffff00", fontStyle: "bold", stroke: "#000", strokeThickness: 4 
    }).setScrollFactor(0).setDepth(100);
    
    leaderboardText = this.add.text(1180, 20, "ŁADOWANIE RANKINGU...", { 
        fontSize: "20px", fill: "#ffffff", align: "right", stroke: "#000", strokeThickness: 3 
    }).setScrollFactor(0).setDepth(100).setOrigin(1, 0); 

    // Firebase - Rejestracja gracza w bazie
    const playerRef = ref(database, "players/" + playerId);
    set(playerRef, {
        name: playerName,
        x: 1500, y: 1500,
        hp: 5,
        alive: true,
        score: 0,
        color: playerColor
    });

    onDisconnect(playerRef).remove();

    /* --- SYNCHRONIZACJA RANKINGU I GRACZY --- */
    onValue(ref(database, "players"), snapshot => {
        const players = snapshot.val();
        if(!players) return;

        // 🏆 Aktualizacja własnego wyniku w tle
        if (players[playerId]) {
            score = players[playerId].score || 0;
            scoreText.setText("Score: " + score);
        }

        // 🏆 Sortowanie i wyświetlanie Leaderboardu
        const sorted = Object.values(players)
            .filter(p => p.name) 
            .sort((a,b) => (b.score || 0) - (a.score || 0));

        let text = "🏆 RANKING GRACZY\n\n";
        sorted.forEach((p, index) => {
            let rankStr = `${index + 1}. ${p.name}: ${p.score || 0} pkt`;
            text += rankStr + "\n";
        });
        leaderboardText.setText(text);

        for(let id in otherPlayers) {
            if(!players[id]) {
                otherPlayers[id].destroy();
                delete otherPlayers[id];
            }
        }

        for(let id in players) {
            if(id === playerId) continue; 

            if(!otherPlayers[id]) {
                otherPlayers[id] = gameScene.add.rectangle(players[id].x, players[id].y, 32, 32, players[id].color);
                otherPlayers[id].isAlive = true;
            }

            if (players[id].alive === false && otherPlayers[id].isAlive) {
                otherPlayers[id].isAlive = false;
                gameScene.tweens.add({
                    targets: otherPlayers[id], scaleX: 1.5, scaleY: 1.5, alpha: 0, duration: 500
                });
            } else if (players[id].alive === true && !otherPlayers[id].isAlive) {
                otherPlayers[id].isAlive = true;
                otherPlayers[id].scaleX = 1;
                otherPlayers[id].scaleY = 1;
                otherPlayers[id].alpha = 1;
            }

            otherPlayers[id].x = players[id].x;
            otherPlayers[id].y = players[id].y;
        }
    });

    /* --- SYNCHRONIZACJA POCISKÓW --- */
    onChildAdded(ref(database, "bullets"), snapshot => {
        const data = snapshot.val();
        const id = snapshot.key;

        const b = bulletsGroup.create(data.x, data.y, 'bulletTex');
        b.body.setCircle(6);
        b.body.setVelocity(data.vx, data.vy);
        b.body.setAllowGravity(false);
        b.owner = data.owner;
        b.dbId = id;
        bullets[id] = b;
    });

    onChildRemoved(ref(database, "bullets"), snapshot => {
        const id = snapshot.key;
        if(bullets[id]) {
            bullets[id].destroy();
            delete bullets[id];
        }
    });

    /* --- GLOBALNA SYNCHRONIZACJA EFEKTÓW TRAFIENIA --- */
    onChildAdded(ref(database, "hits"), snapshot => {
        const data = snapshot.val();
        if (Date.now() - data.time < 2000) {
            playHitEffect(data.x, data.y);
        }
    });

    /* --- SYSTEM PRZYZNAWANIA PUNKTÓW (Killer aktualizuje własne konto) --- */
    let isReadyForKills = false;
    setTimeout(() => isReadyForKills = true, 2000); // Zapobiega czytaniu starych zgonów przy ładowaniu strony

    onChildAdded(ref(database, "deaths"), snapshot => {
        if (!isReadyForKills) return; // Pomijamy historyczne zgony na start

        const data = snapshot.val();
        // Jeśli to MY zabiliśmy, samodzielnie i bezpiecznie powiększamy NASZ wynik
        if (data.killer === playerId) {
            score += 1;
            scoreText.setText("Score: " + score);
            fbUpdate(ref(database, "players/" + playerId), { score: score });
        }
    });
}

function createWall(scene, x, y, width, height) {
    const wall = scene.add.tileSprite(x, y, width, height, 'wallTex');
    scene.physics.add.existing(wall, true);
    walls.add(wall);
}

/* ================= MECHANIKA OBRAŻEŃ I ŚMIERCI ================= */
function takeDamage(killerId, hitX, hitY) {
    if (isDead) return;

    playerHP -= 1;
    lastActionTime = Date.now(); 
    
    // Rozgłoszenie efektu trafienia
    push(ref(database, "hits"), { target: playerId, shooter: killerId, x: hitX, y: hitY, time: Date.now() });

    if (playerHP <= 0) {
        die(killerId);
    } else {
        fbUpdate(ref(database, "players/" + playerId), { hp: playerHP });
    }
}

function playHitEffect(x, y) {
    const hitCircle = gameScene.add.circle(x, y, 16, 0xff0000);
    gameScene.tweens.add({
        targets: hitCircle, scaleX: 2.5, scaleY: 2.5, alpha: 0,
        duration: 300, onComplete: () => hitCircle.destroy()
    });
}

function die(killerId) {
    isDead = true;
    playerHP = 0;
    localPlayer.body.enable = false;

    // OFIARA OGŁASZA ŚMIERĆ (wywoła to u zabójcy "onChildAdded" i zabójca doda sobie punkt)
    push(ref(database, "deaths"), { victim: playerId, killer: killerId, time: Date.now() });

    fbUpdate(ref(database, "players/" + playerId), { hp: 0, alive: false });

    // Animacja
    gameScene.tweens.add({
        targets: localPlayer, scaleX: 1.5, scaleY: 1.5, alpha: 0,
        duration: 500,
        onComplete: () => {
            setTimeout(() => respawn(), 3000);
        }
    });
}

function respawn() {
    isDead = false;
    playerHP = 5;
    lastActionTime = Date.now(); 
    
    localPlayer.x = 400 + Math.random() * 2000; 
    localPlayer.y = 400 + Math.random() * 2000;
    
    localPlayer.scaleX = 1;
    localPlayer.scaleY = 1;
    localPlayer.alpha = 1;
    localPlayer.body.enable = true;

    fbUpdate(ref(database, "players/" + playerId), {
        hp: playerHP, alive: true, x: localPlayer.x, y: localPlayer.y
    });
}

/* ================= STRZELANIE ================= */
function shoot() {
    if (isDead || playerHP <= 0 || shootCooldown) return;

    shootCooldown = true;
    setTimeout(() => shootCooldown = false, 350); 
    lastActionTime = Date.now(); 

    const speed = 900;
    const dx = mousePointer.worldX - localPlayer.x;
    const dy = mousePointer.worldY - localPlayer.y;
    const len = Math.sqrt(dx*dx + dy*dy);
    if(len === 0) return;

    const vx = (dx / len) * speed;
    const vy = (dy / len) * speed;

    const bulletRef = push(ref(database, "bullets"));

    set(bulletRef, {
        owner: playerId,
        x: localPlayer.x, y: localPlayer.y,
        vx, vy
    });

    setTimeout(() => {
        remove(bulletRef).catch(()=>{});
    }, 2000);
}

/* ================= GŁÓWNA PĘTLA GRY ================= */
function gameUpdate(time, delta) {
    if (!localPlayer) return;

    localPlayer.body.setVelocity(0);

    if (!isDead) {
        if(cursors.A.isDown) localPlayer.body.setVelocityX(-300);
        if(cursors.D.isDown) localPlayer.body.setVelocityX(300);
        if(cursors.W.isDown) localPlayer.body.setVelocityY(-300);
        if(cursors.S.isDown) localPlayer.body.setVelocityY(300);

        // --- MECHANIKA REGENERACJI HP ---
        const now = Date.now();
        if (playerHP > 0 && playerHP < 5) {
            if (now - lastActionTime >= 6000) { 
                if (!isRegenerating) {
                    isRegenerating = true;
                    nextRegenTime = now; 
                }

                if (now >= nextRegenTime) {
                    playerHP = Math.min(5, playerHP + 1);
                    nextRegenTime = now + 3000; 
                    fbUpdate(ref(database, "players/" + playerId), { hp: playerHP });
                }
            }
        } else {
            isRegenerating = false;
        }
    }

    hpText.setText("HP: " + playerHP);

    networkTimer += delta;
    if (networkTimer >= NETWORK_RATE && !isDead) {
        networkTimer = 0;
        fbUpdate(ref(database, "players/" + playerId), {
            x: Math.round(localPlayer.x),
            y: Math.round(localPlayer.y)
        });
    }
}

/* ROZPOCZĘCIE */
login();

</script>
</head>
<body></body>
</html>
